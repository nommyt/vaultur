allowBuilds:
  core-js-pure: true
  esbuild: true
  lefthook: true
  sharp: true
  workerd: true
# Single-package repo. This file only carries pnpm build-approval settings
# and dependency overrides; it does not declare any workspace packages.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
# Pin transitive deps pinned by our own devDependencies at vulnerable
# versions (@cloudflare/vitest-pool-workers -> wrangler -> miniflare -> ws;
# drizzle-kit -> deprecated @esbuild-kit/esm-loader -> esbuild) to patched
# releases. See Dependabot alerts on the ws/wrangler/esbuild advisories.
overrides:
  wrangler: ^4.106.0
  ws: ^8.21.0
  esbuild: ^0.25.4
